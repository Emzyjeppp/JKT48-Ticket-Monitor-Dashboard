<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT48 Ticket Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-rose-500 tracking-wide">🔴 JKT48 TICKET MONITOR</h1>
                <p class="text-slate-400 text-sm mt-1">Pantau kuota tiket event JKT48 secara cepat lewat Dump JSON</p>
            </div>
            <div id="lastUpdate" class="text-slate-400 text-xs mt-2 md:mt-0"></div>
        </header>

        <section class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700 mb-8">
            <label class="block text-sm font-semibold mb-2 text-rose-400">Tempel (Paste) Response JSON dari Network Tab di sini:</label>
            <textarea id="jsonInput" rows="4" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-sm font-mono text-green-400 focus:outline-none focus:border-rose-500" placeholder='{"status": true, "data": [...]}'></textarea>
            
            <div class="mt-4 flex flex-wrap gap-3 justify-between items-center">
                <button onclick="prosesDump()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 px-6 rounded-lg shadow transition cursor-pointer text-sm">
                    ⚡ Proses & Urutkan Data
                </button>
                
                <input type="text" id="searchFilter" oninput="filterData()" placeholder="Cari nama member (misal: Kathrina)..." class="bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm w-full md:w-64 focus:outline-none focus:border-rose-500 hidden">
            </div>
        </section>

        <main id="dashboardSection" class="hidden">
            <div class="overflow-x-auto bg-slate-800 rounded-xl shadow-lg border border-slate-700">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700/50 text-slate-300 text-xs font-bold uppercase tracking-wider border-b border-slate-700">
                            <th class="p-4">Sesi / Event</th>
                            <th class="p-4">Jalur</th>
                            <th class="p-4 text-rose-300">Nama Member</th>
                            <th class="p-4 text-center">Tiket Terjual</th>
                            <th class="p-4 text-center">Sisa Stok</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let semuaMasterData = [];

        function prosesDump() {
            const rawText = document.getElementById('jsonInput').value.trim();
            if(!rawText) {
                alert('Teks JSON kosong! Salin dulu dari Network Tab.');
                return;
            }

            try {
                const parsed = JSON.parse(rawText);
                const dataSesi = parsed.data || parsed;
                
                if(!Array.isArray(dataSesi)) {
                    alert('Struktur JSON tidak dikenali sebagai format JKT48.');
                    return;
                }

                semuaMasterData = []; // Reset data lama

                // Unpack data dari JSON ke flat array
                dataSesi.forEach(sesi => {
                    const labelSesi = sesi.label || 'Sesi';
                    const sesiSingkat = labelSesi.split('·')[0].trim();

                    if(sesi.session_members && Array.isArray(sesi.session_members)) {
                        sesi.session_members.forEach(m => {
                            semuaMasterData.push({
                                sesi: sesiSingkat,
                                jalur: m.label || '-',
                                nama: m.member_name,
                                terjual: m.tickets_sold,
                                sisa: m.quota
                            });
                        });
                    }
                });

                // Urutkan default: Sisa tiket paling sedikit berada di atas (Biar tahu siapa yang mau sold out)
                semuaMasterData.sort((a, b) => a.sisa - b.sisa);

                // Tampilkan elemen dashboard & live search
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('searchFilter').classList.remove('hidden');
                document.getElementById('lastUpdate').innerText = `Terakhir Update: ${new Date().toLocaleTimeString('id-ID')} WIB`;

                renderTabel(semuaMasterData);

            } catch (error) {
                alert('Gagal membaca JSON. Pastikan seluruh teks tercopy dengan sempurna ya!\nError: ' + error.message);
            }
        }

        function renderTabel(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-500">Tidak ada data member yang cocok.</td></tr>`;
                return;
            }

            data.forEach(item => {
                // Penentuan badge status kuota
                let statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-green-500/20 text-green-400">Tersedia</span>`;
                let rowBg = "hover:bg-slate-700/30 transition";

                if (item.sisa === 0) {
                    statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-rose-500/20 text-rose-400">SOLD OUT</span>`;
                    rowBg = "bg-rose-950/10 text-slate-500 hover:bg-rose-950/20";
                } else if (item.sisa <= 5) {
                    statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-amber-500/20 text-amber-400 animate-pulse">Menipis</span>`;
                    rowBg = "bg-amber-950/10 hover:bg-amber-950/20 text-amber-100";
                }

                const row = `
                    <tr class="${rowBg}">
                        <td class="p-4 font-medium text-slate-300">${item.sesi}</td>
                        <td class="p-4 text-slate-400 text-xs">${item.jalur}</td>
                        <td class="p-4 font-bold text-slate-200">${item.nama}</td>
                        <td class="p-4 text-center font-mono font-semibold">${item.terjual}</td>
                        <td class="p-4 text-center font-mono font-bold text-emerald-400">${item.sisa}</td>
                        <td class="p-4 text-center">${statusBadge}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // Fitur Live Search Real-time tanpa klik tombol lagi
        function filterData() {
            const keyword = document.getElementById('searchFilter').value.toLowerCase();
            const hasilFilter = semuaMasterData.filter(item => 
                item.nama.toLowerCase().includes(keyword) || 
                item.sesi.toLowerCase().includes(keyword)
            );
            renderTabel(hasilFilter);
        }
    </script>
</body>
</html>
