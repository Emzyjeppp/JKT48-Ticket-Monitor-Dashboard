name: JKT48 Auto Fetch Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch API JKT48 Fix Endpoints
        run: |
          # 1. Kategori PHOTOCARD
          PC_SBY=$(curl -s "https://jkt48.com/api/v1/exclusives/EX9A4A/bonus?lang=id")
          PC_YOGYA=$(curl -s "https://jkt48.com/api/v1/exclusives/EXCB75/bonus?lang=id")
          
          # 2. Kategori 2-SHOT
          SHOT_SBY=$(curl -s "https://jkt48.com/api/v1/exclusives/EX3773/bonus?lang=id")
          SHOT_YOGYA=$(curl -s "https://jkt48.com/api/v1/exclusives/EXCD2C/bonus?lang=id")
          
          node -e "
          try {
            let output = [];

            // Fungsi pembantu untuk parsing data secara terstruktur
            function cetakData(jsonData, jenisBenefit, namaEvent) {
              if (jsonData && jsonData.data && Array.isArray(jsonData.data)) {
                jsonData.data.forEach(sesi => {
                  const labelSesi = sesi.label || 'Sesi';
                  const sesiSingkat = labelSesi.split('·')[0].trim();
                  
                  if (sesi.session_members) {
                    sesi.session_members.forEach(m => {
                      output.push({
                        sesi: sesiSingkat,
                        event: namaEvent,
                        jenis: jenisBenefit,
                        jalur: m.label || '-',
                        nama: m.member_name,
                        terjual: m.tickets_sold,
                        sisa: m.quota
                      });
                    });
                  }
                });
              }
            }

            // Eksekusi parsing sesuai pembagian link dari user
            cetakData($PC_SBY, 'Photocard', 'LOVE & DREAM (SBY)');
            cetakData($PC_YOGYA, 'Photocard', 'PASSION (YOGYA)');
            cetakData($SHOT_SBY, '2-Shot', 'LOVE & DREAM (SBY)');
            cetakData($SHOT_YOGYA, '2-Shot', 'PASSION (YOGYA)');
            
            // Urutkan kuota tiket paling menipis ke paling atas
            output.sort((a, b) => a.sisa - b.sisa);
            
            const waktuWIB = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }) + ' WIB';
            const finalJson = { last_updated: waktuWIB, data: output };
            
            require('fs').writeFileSync('data.json', JSON.stringify(finalJson, null, 2));
            console.log('File data.json sukses diperbarui dengan data link ter-fix.');
          } catch(e) {
            console.error('Gagal memproses JSON:', e.message);
            process.exit(1);
          }
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "jkt48-bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto update kuota fix link: $(date)" || exit 0
          git push