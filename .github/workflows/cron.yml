name: JKT48 Auto Fetch Bot

on:
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch API JKT48 Fix Endpoints
        run: |
          node -e "
          async function run() {
            try {
              console.log('Fetching live data from Cloudflare Worker proxy...');
              const res = await fetch('https://jkt48-monitor-api.jefryoconner49.workers.dev');
              if (!res.ok) throw new Error('API Worker returned status ' + res.status);
              const data = await res.json();
              
              // Validate the format
              if (!data || !data.data) throw new Error('Format data tidak valid');
              
              require('fs').writeFileSync('data.json', JSON.stringify(data, null, 2));
              console.log('File data.json sukses diperbarui dari Worker API.');
            } catch(e) {
              console.error('Gagal memproses JSON:', e.message);
              // Exit gracefully so the workflow stays green on rate limit/network errors
              process.exit(0);
            }
          }
          run();
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "jkt48-bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto update kuota fix link: $(date)" || exit 0
          git push