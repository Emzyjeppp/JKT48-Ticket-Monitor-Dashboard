<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT48 Live Ticket Monitor - Server Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center md:text-left flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-rose-500 tracking-wide">🔴 JKT48 LIVE TICKET MONITOR</h1>
                <p class="text-slate-400 text-sm mt-1">Data otomatis diperbarui oleh GitHub Actions Server</p>
            </div>
            <div class="text-right mt-2 md:mt-0">
                <div id="statusFetch" class="text-xs font-bold text-emerald-400">🟢 Terhubung ke Repositori</div>
                <div id="lastUpdate" class="text-slate-400 text-xs mt-1">Memuat waktu sync...</div>
            </div>
        </header>

        <section class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700 mb-6">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-rose-400">Pencarian Live:</label>
                    <input type="text" id="searchFilter" oninput="filterData()" placeholder="Cari nama member atau sesi..." class="bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm w-full md:w-80 focus:outline-none focus:border-rose-500">
                </div>
                <button onclick="bacaDataLokal()" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-4 rounded-lg text-sm transition cursor-pointer mt-4 md:mt-0">
                    🔄 Refresh Tampilan
                </button>
            </div>
        </section>

        <main>
            <div class="overflow-x-auto bg-slate-800 rounded-xl shadow-lg border border-slate-700">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700/50 text-slate-300 text-xs font-bold uppercase tracking-wider border-b border-slate-700">
                            <th class="p-4">Sesi</th>
                            <th class="p-4">Jalur</th>
                            <th class="p-4 text-rose-300">Nama Member</th>
                            <th class="p-4 text-center">Tiket Terjual</th>
                            <th class="p-4 text-center">Sisa Stok</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-700">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-slate-400">Sedang mengambil data terbaru dari server...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let semuaMasterData = [];

        // Fungsi membaca file hasil garapan GitHub Actions tanpa CORS Error
        async function bacaDataLokal() {
            const statusDiv = document.getElementById('statusFetch');
            try {
                // Menembak file lokal data.json yang diupdate otomatis oleh github di rumahnya sendiri
                const response = await fetch('./data.json?_cb=' + new Date().getTime());
                if (!response.ok) throw new Error("File data.json belum siap/belum dibuat oleh server GitHub.");
                
                const dataJson = await response.json();
                semuaMasterData = dataJson.data || [];
                
                document.getElementById('lastUpdate').innerText = `Terakhir Sync Server JKT48: ${dataJson.last_updated || '-'}`;
                statusDiv.innerText = "🟢 Data Sinkron";
                statusDiv.className = "text-xs font-bold text-emerald-400";
                
                filterData();
            } catch (error) {
                statusDiv.innerText = "⚠️ Menunggu Server Generate Data";
                statusDiv.className = "text-xs font-bold text-amber-400";
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="p-8 text-center text-amber-300">
                            ${error.message}<br>
                            <span class="text-xs text-slate-400">Silakan tunggu sekitar 1-2 menit hingga bot GitHub selesai melakukan pengambilan data pertama kali.</span>
                        </td>
                    </tr>`;
            }
        }

        function renderTabel(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-500">Tidak ada data yang cocok.</td></tr>`;
                return;
            }

            data.forEach(item => {
                let statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-green-500/20 text-green-400">Tersedia</span>`;
                let rowBg = "hover:bg-slate-700/30 transition";

                if (item.sisa === 0) {
                    statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-rose-500/20 text-rose-400">SOLD OUT</span>`;
                    rowBg = "bg-rose-950/10 text-slate-500 hover:bg-rose-950/20";
                } else if (item.sisa <= 5) {
                    statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-amber-500/20 text-amber-400 animate-pulse">Menipis</span>`;
                    rowBg = "bg-amber-950/10 hover:bg-amber-950/20 text-amber-100";
                }

                tbody.innerHTML += `
                    <tr class="${rowBg}">
                        <td class="p-4 font-medium text-slate-300">${item.sesi}</td>
                        <td class="p-4 text-slate-400 text-xs">${item.jalur}</td>
                        <td class="p-4 font-bold text-slate-200">${item.nama}</td>
                        <td class="p-4 text-center font-mono font-semibold">${item.terjual}</td>
                        <td class="p-4 text-center font-mono font-bold text-emerald-400">${item.sisa}</td>
                        <td class="p-4 text-center">${statusBadge}</td>
                    </tr>
                `;
            });
        }

        function filterData() {
            const keyword = document.getElementById('searchFilter').value.toLowerCase();
            const hasilFilter = semuaMasterData.filter(item => 
                item.nama.toLowerCase().includes(keyword) || 
                item.sesi.toLowerCase().includes(keyword)
            );
            renderTabel(hasilFilter);
        }

        // Jalankan otomatis saat halaman dimuat
        window.onload = function() {
            bacaDataLokal();
            // Cek pembaruan file di halaman web setiap 15 detik
            setInterval(bacaDataLokal, 15000);
        };
    </script>
</body>
</html>
